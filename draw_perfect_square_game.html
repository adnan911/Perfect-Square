
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,600;1,9..40,300&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, .root {
    min-height: 100vh;
    background: #080c0a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  .screen {
    width: 360px;
    min-height: 640px;
    background: #080c0a;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 24px 40px;
  }

  /* Grid background */
  .screen::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(0, 255, 140, 0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 140, 0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* Radial glow center */
  .screen::after {
    content: '';
    position: absolute;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, rgba(0, 230, 118, 0.07) 0%, transparent 70%);
    pointer-events: none;
  }

  /* ── Top badge ── */
  .badge {
    margin-top: 40px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: #00e676;
    text-transform: uppercase;
    border: 1px solid rgba(0, 230, 118, 0.3);
    padding: 5px 14px;
    border-radius: 100px;
    background: rgba(0, 230, 118, 0.06);
    z-index: 1;
  }

  /* ── Canvas preview ── */
  .preview-wrap {
    margin-top: 28px;
    z-index: 1;
    position: relative;
  }

  .preview-canvas {
    width: 90px;
    height: 90px;
    border: 1.5px solid rgba(0, 230, 118, 0.5);
    background: transparent;
    position: relative;
  }

  /* Animated corner dots */
  .corner {
    position: absolute;
    width: 7px;
    height: 7px;
    background: #00e676;
    border-radius: 50%;
    animation: pulse-corner 2s ease-in-out infinite;
  }
  .corner.tl { top: -3.5px; left: -3.5px; }
  .corner.tr { top: -3.5px; right: -3.5px; animation-delay: 0.5s; }
  .corner.br { bottom: -3.5px; right: -3.5px; animation-delay: 1s; }
  .corner.bl { bottom: -3.5px; left: -3.5px; animation-delay: 1.5s; }

  /* Faint diagonal measurement lines */
  .preview-canvas svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  @keyframes pulse-corner {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.7); }
  }

  /* Score row */
  .score-row {
    margin-top: 20px;
    display: flex;
    gap: 20px;
    z-index: 1;
  }
  .score-chip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }
  .score-chip .val {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: #fff;
  }
  .score-chip .lbl {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .divider-v {
    width: 1px;
    height: 36px;
    background: rgba(255,255,255,0.1);
    align-self: center;
  }

  /* ── Title area ── */
  .title-area {
    margin-top: 28px;
    text-align: center;
    z-index: 1;
  }

  .title-area h1 {
    font-family: 'DM Sans', sans-serif;
    font-size: 32px;
    font-weight: 300;
    color: #fff;
    line-height: 1.15;
    letter-spacing: -0.01em;
  }

  .title-area h1 span {
    font-weight: 600;
    color: #00e676;
    display: block;
    font-size: 38px;
  }

  .subtitle {
    margin-top: 12px;
    font-size: 14px;
    color: rgba(255,255,255,0.45);
    font-weight: 300;
    line-height: 1.6;
    max-width: 260px;
    margin-left: auto;
    margin-right: auto;
  }

  /* ── Accuracy meter ── */
  .meter-wrap {
    margin-top: 28px;
    width: 100%;
    z-index: 1;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 12px;
    padding: 14px 18px;
  }

  .meter-label {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .meter-label span {
    font-size: 11px;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .meter-label strong {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: #00e676;
  }

  .meter-track {
    height: 4px;
    background: rgba(255,255,255,0.08);
    border-radius: 100px;
    overflow: hidden;
  }
  .meter-fill {
    height: 100%;
    width: 72%;
    background: linear-gradient(90deg, #00c853, #00e676);
    border-radius: 100px;
    position: relative;
    animation: shimmer 2.5s ease-in-out infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  /* ── CTA button ── */
  .cta-btn {
    margin-top: 28px;
    width: 100%;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 16px;
    background: #00e676;
    color: #080c0a;
    border: none;
    border-radius: 12px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: transform 0.15s, background 0.15s;
  }

  .cta-btn:hover { background: #69f0ae; transform: translateY(-1px); }
  .cta-btn:active { transform: scale(0.97); }

  .play-icon {
    width: 0;
    height: 0;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
    border-left: 10px solid #080c0a;
  }

  /* ── Features row ── */
  .features {
    margin-top: 20px;
    display: flex;
    gap: 10px;
    width: 100%;
    z-index: 1;
  }

  .feat {
    flex: 1;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 11px 10px;
    text-align: center;
  }
  .feat .feat-icon {
    font-size: 16px;
    margin-bottom: 5px;
    color: #00e676;
  }
  .feat p {
    font-size: 11px;
    color: rgba(255,255,255,0.4);
    line-height: 1.4;
  }
</style>

<div class="root">
  <div class="screen">

    <div class="badge">Precision Challenge</div>

    <div class="preview-wrap">
      <div class="preview-canvas">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner br"></div>
        <div class="corner bl"></div>
        <svg viewBox="0 0 90 90" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="45" y1="0" x2="45" y2="90" stroke="rgba(0,230,118,0.12)" stroke-width="0.5"/>
          <line x1="0" y1="45" x2="90" y2="45" stroke="rgba(0,230,118,0.12)" stroke-width="0.5"/>
          <line x1="0" y1="0" x2="90" y2="90" stroke="rgba(0,230,118,0.08)" stroke-width="0.5"/>
          <line x1="90" y1="0" x2="0" y2="90" stroke="rgba(0,230,118,0.08)" stroke-width="0.5"/>
        </svg>
      </div>
    </div>

    <div class="score-row">
      <div class="score-chip">
        <span class="val">12</span>
        <span class="lbl">Attempts</span>
      </div>
      <div class="divider-v"></div>
      <div class="score-chip">
        <span class="val">94%</span>
        <span class="lbl">Best</span>
      </div>
      <div class="divider-v"></div>
      <div class="score-chip">
        <span class="val">#3</span>
        <span class="lbl">Rank</span>
      </div>
    </div>

    <div class="title-area">
      <h1>
        Draw the
        <span>Perfect Square</span>
      </h1>
      <p class="subtitle">Test your geometric precision. No tools. No rulers. Just your finger.</p>
    </div>

    <div class="meter-wrap">
      <div class="meter-label">
        <span>Accuracy score</span>
        <strong>72%</strong>
      </div>
      <div class="meter-track">
        <div class="meter-fill"></div>
      </div>
    </div>

    <button class="cta-btn" onclick="sendPrompt('Start the Draw the Perfect Square game')">
      <div class="play-icon"></div>
      Start Drawing
    </button>

    <div class="features">
      <div class="feat">
        <div class="feat-icon"><i class="ti ti-hand-finger" aria-hidden="true"></i></div>
        <p>Freehand<br>only</p>
      </div>
      <div class="feat">
        <div class="feat-icon"><i class="ti ti-chart-line" aria-hidden="true"></i></div>
        <p>Live score<br>feedback</p>
      </div>
      <div class="feat">
        <div class="feat-icon"><i class="ti ti-trophy" aria-hidden="true"></i></div>
        <p>Global<br>leaderboard</p>
      </div>
    </div>

  </div>
</div>
